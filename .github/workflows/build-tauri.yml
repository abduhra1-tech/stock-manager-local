# .github/workflows/build-tauri.yml
name: Raseed Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'stockbase/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './stockbase/src-tauri -> target'

      - name: Install Linux dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Install dependencies
        working-directory: stockbase  # ← FIXED: removed ./
        run: npm ci

      - name: Build Tauri app
        working-directory: stockbase  # ← FIXED: removed ./
        run: npm run tauri build -- --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-${{ matrix.platform }}-${{ github.sha }}
          path: |
            stockbase/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 7

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.platform }}-${{ github.sha }}
          path: |
            stockbase/src-tauri/target/debug/build/**/output
            stockbase/npm-debug.log*
          if-no-files-found: ignore
