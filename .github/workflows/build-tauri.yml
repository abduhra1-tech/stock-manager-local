# Navigate to your repository
cd stock-manager-local

# Update the workflow file with valid SHAs
cat > .github/workflows/build.yml << 'YAML'
name: Raseed Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      
      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: stockbase/package-lock.json
      
      # Use rustup directly instead of dtolnay/rust-toolchain
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version
        shell: bash
      
      # Add Windows target if on Windows
      - name: Add Windows target
        if: matrix.platform == 'windows-latest'
        run: rustup target add x86_64-pc-windows-msvc
        shell: bash
      
      - name: Install Dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      
      - name: Install Dependencies & Build
        working-directory: ./stockbase
        run: |
          npm ci || npm install
          npx tauri build
        shell: bash
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: Raseed-${{ matrix.platform }}
          path: |
            stockbase/src-tauri/target/release/bundle/**/*
          retention-days: 7
          if-no-files-found: warn
YAML

# Commit and push
git add .github/workflows/build.yml
git commit -m "ci: replace rust-toolchain action with rustup installation"
git push origin main
