name: Build Tauri App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.platform }}

    steps:
    # actions/checkout - latest v4 SHA (as of 2024)
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      with:
        fetch-depth: 0
    
    # actions/setup-node - latest v4 SHA
    - name: Setup Node.js
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
      with:
        node-version: '20'
        cache: 'npm'
    
    # dtolnay/rust-toolchain - stable SHA
    - name: Install Rust
      uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a613336ec90b3  # stable as of 2024
      with:
        toolchain: stable
    
    # Install Linux dependencies
    - name: Install dependencies (Ubuntu only)
      if: matrix.platform == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
    
    # Install Windows dependencies (if needed)
    - name: Install dependencies (Windows only)
      if: matrix.platform == 'windows-latest'
      run: |
        echo "Windows dependencies are handled by Rust"
    
    # Install macOS dependencies (if needed)
    - name: Install dependencies (macOS only)
      if: matrix.platform == 'macos-latest'
      run: |
        echo "macOS dependencies are handled by Rust"
    
    - name: Install frontend dependencies
      run: npm install
    
    - name: Build Tauri app
      run: npm run tauri build
    
    # actions/upload-artifact - latest v4 SHA
    - name: Upload artifacts
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
      with:
        name: tauri-app-${{ matrix.platform }}
        path: |
          src-tauri/target/release/bundle/
