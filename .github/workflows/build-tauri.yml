# 1. Check what workflow files exist
ls -la .github/workflows/

# 2. Remove the broken build-tauri.yml file
rm -f .github/workflows/build-tauri.yml

# 3. Verify only one clean workflow remains
ls -la .github/workflows/
# Should show only: main.yml OR build.yml (not both)

# 4. Trigger a new build
git add -A
git commit -m "fix: remove broken workflow file"
git push origin main
