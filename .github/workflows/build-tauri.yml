# 1. Remove old broken workflows
rm -f .github/workflows/build-tauri.yml .github/workflows/build.yml

# 2. Create clean workflow using heredoc (preserves formatting)
mkdir -p .github/workflows
cat > .github/workflows/build.yml << 'EOF'
name: Raseed Build
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: ./stockbase
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: stockbase/package-lock.json
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev
      - name: Install dependencies
        run: npm ci
      - name: Build Tauri app
        run: npx tauri build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Raseed-${{ matrix.platform }}
          path: stockbase/src-tauri/target/release/bundle/**/*
          retention-days: 7
          if-no-files-found: warn
EOF

# 3. Verify no trailing whitespace
grep -n ' $' .github/workflows/build.yml && echo "⚠️ Found trailing spaces!" || echo "✅ Clean"

# 4. Commit and push
git add -A
git commit -m "ci: fix workflow - use verified tags, remove whitespace"
git push origin main
