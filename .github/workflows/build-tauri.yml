# .github/workflows/build-tauri.yml
name: Raseed Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: stockbase  # ← FIXED: removed ./

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Repository structure
        run: |
          echo "=== Root ===" && ls -la
          echo "=== stockbase/ ===" && ls -la stockbase/ 2>/dev/null || echo "⚠️ stockbase/ not found"
          echo "=== .github/workflows ===" && ls -la .github/workflows/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'stockbase/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './stockbase/src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Debug - Verify before build
        run: |
          echo "=== stockbase/src-tauri ===" && ls -la src-tauri/
          echo "=== Cargo.toml ===" && head -20 src-tauri/Cargo.toml

      - name: Build Tauri app
        run: npm run tauri build -- --verbose

      - name: Debug - List artifacts
        if: always()
        run: |
          echo "=== Bundle output ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null | head -20 || echo "⚠️ No bundle found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-${{ matrix.platform }}-${{ github.sha }}
          path: |
            stockbase/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 7

      - name: Upload debug logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.platform }}-${{ github.sha }}
          path: |
            stockbase/src-tauri/target/**/output
            stockbase/npm-debug.log*
          retention-days: 3
