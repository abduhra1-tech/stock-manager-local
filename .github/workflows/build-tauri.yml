# .github/workflows/build-tauri.yml
name: Raseed Build
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af687  # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@395ad326223194a2c8ee232e96f6f972bae410e7  # v4.1.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: stockbase/package-lock.json
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev
      - name: Install deps & build
        working-directory: ./stockbase
        run: npm ci && npm run tauri build
      - name: Upload artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: Raseed-linux
          path: stockbase/src-tauri/target/release/bundle/**/*
          retention-days: 7
