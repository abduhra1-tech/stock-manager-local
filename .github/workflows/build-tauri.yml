# 1. Replace your workflow file
cat > .github/workflows/build-tauri.yml << 'EOF'
name: Raseed Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: ./stockbase
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: stockbase/package-lock.json
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}
      
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Tauri app
        run: npx tauri build --verbose
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Raseed-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**/*
          retention-days: 7
          if-no-files-found: warn
EOF

# 2. Commit and push
git add .github/workflows/build-tauri.yml
git commit -m "fix(ci): add npm install step and fix working directory for Tauri build"
git push origin main
