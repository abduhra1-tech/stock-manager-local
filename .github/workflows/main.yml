name: Raseed Build
on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  APP_NAME: Raseed
  APP_VERSION: 0.1.0

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # ✅ Setup Bun (not npm!)
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      # ✅ Install Linux system dependencies for Tauri
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            patchelf
      
      # ✅ Use bun install (not npm ci!)
      - name: Install dependencies
        run: bun install
      
      # ✅ Build frontend + Tauri
      - name: Build app
        run: |
          bun run build
          bunx tauri build --bundles deb,rpm
      
      # ✅ Upload artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: raseed-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      # ✅ Setup Bun
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      # ✅ Install dependencies with Bun
      - name: Install dependencies
        run: bun install
      
      # ✅ Build for Windows
      - name: Build app
        run: |
          bun run build
          bunx tauri build --bundles msi,nsis
      
      # ✅ Upload artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: raseed-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
