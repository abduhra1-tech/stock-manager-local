name: Build Raseed

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b6c782352e4b8a618342ac15bcbb85fcb2  # v2.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@37ccb0e5bc2473f4ea4d6e2b7b11b97d1a8e3f2e  # stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            patchelf

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: raseed-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b6c782352e4b8a618342ac15bcbb85fcb2  # v2.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@37ccb0e5bc2473f4ea4d6e2b7b11b97d1a8e3f2e  # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: raseed-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
