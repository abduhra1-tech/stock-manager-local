name: Build Raseed

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            patchelf \
            libappindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        run: npx @tauri-apps/cli build --bundles deb,rpm,appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        run: npx @tauri-apps/cli build --bundles msi,nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f
          ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Raseed ${{ needs.build-linux.outputs.version }}
          body: |
            ## 🏪 Raseed - Smart Retail System for Moroccan Shops
            
            ### ✨ Features
            - 🏷️ Barcode Scanner (USB HID)
            - 🧾 Receipt Printing (58mm/80mm thermal)
            - 📶 100% Offline (SQLite)
            - 💾 Backup/Restore (JSON + CSV)
            - 📊 Sales Reports & Dashboard
            - 🇲🇦 French/Arabic bilingual + RTL
            
            ### 📦 Installation
            
            **Linux (Debian/Ubuntu)**
            ```bash
            sudo dpkg -i Raseed_*.deb
            raseed
