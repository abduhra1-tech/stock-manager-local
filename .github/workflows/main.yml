name: Raseed Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true
  GITHUB_ACTIONS: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev
      
      - run: bun install
      - run: bun run build
      - run: npx @tauri-apps/cli build
      
      - uses: actions/upload-artifact@v4
        with:
          name: raseed-linux
          path: src-tauri/target/release/bundle/**/*
