name: Build Raseed

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev \
            librsvg2-dev libssl-dev libsqlite3-dev build-essential patchelf

      - run: bun install
      - run: bun run build
      - run: [ -d "dist" ] || (echo "❌ dist missing" && exit 1)
      - run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: raseed-linux
          path: src-tauri/target/release/bundle/**/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run build
      - run: if (Test-Path dist) { echo "dist exists" } else { exit 1 }
      - run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: raseed-windows
          path: src-tauri/target/release/bundle/**/*
