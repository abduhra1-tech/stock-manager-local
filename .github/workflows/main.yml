name: Raseed Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev build-essential
      
      - run: bun install
      - run: bun run build
      - run: npx @tauri-apps/cli build
      
      - uses: actions/upload-artifact@v4
        with:
          name: raseed-linux
          path: src-tauri/target/release/bundle/**/*
  
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - run: bun install
      - run: bun run build
      - run: npx @tauri-apps/cli build
      
      - uses: actions/upload-artifact@v4
        with:
          name: raseed-windows
          path: src-tauri/target/release/bundle/**/*
