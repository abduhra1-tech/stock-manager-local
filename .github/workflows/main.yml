name: Raseed Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: ./stockbase

    steps:
      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      # ✅ Install Node manually
      - name: Setup Node (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Setup Node (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install nodejs-lts -y

      # ✅ Install Bun
      - name: Install Bun
        run: npm install -g bun

      # ✅ Install Rust manually
      - name: Install Rust (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Rust (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install rust -y

      # ✅ Linux deps for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@8c5c8b3f2c8f1b5f0a7e9d4c2a6b3c4d5e6f7a8b
        with:
          name: stock-manager-${{ matrix.platform }}
          path: stockbase/src-tauri/target/release/bundle/**/*
          retention-days: 7
