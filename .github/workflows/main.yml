name: Build Raseed

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04  # Use stable version, not latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            patchelf \
            libssl-dev \
            libsqlite3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.0  # Pin to known working version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html || exit 1

      - name: Build Tauri app
        run: npx @tauri-apps/cli build --bundles deb,rpm,appimage
        env:
          CI: false  # Important: prevents treating warnings as errors

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  build-windows:
    runs-on: windows-2022  # Stable Windows version
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          dir dist
          if not exist dist\index.html exit 1

      - name: Build Tauri app
        run: npx @tauri-apps/cli build --bundles msi,nsis
        env:
          CI: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
