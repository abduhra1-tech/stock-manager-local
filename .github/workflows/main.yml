name: Build Raseed

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false  # ✅ prevents macOS from canceling others
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: raseed-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: raseed-windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: raseed-macos

    runs-on: ${{ matrix.os }}

    env:
      TAURI_SKIP_SIGNING: true  # ✅ Skip code signing for dev builds
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ✅ FIX macOS crashes
      - name: Setup Xcode (macOS)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Add macOS target (safety)
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            patchelf

      # ✅ Install JS dependencies
      - name: Install dependencies
        run: bun install

      # ✅ Build frontend FIRST (with fail-fast)
      - name: Build frontend
        run: bun run build || exit 1

      # ✅ Verify dist/ exists before Tauri build
      - name: Verify dist exists
        run: |
          [ -d "dist" ] || (echo "❌ dist missing" && exit 1)
          echo "✅ dist/ found with $(ls dist | wc -l) files"

      # ✅ Build Tauri app (stable: cargo, not npx)
      - name: Build Tauri app
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: trace
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          echo "=== Starting Tauri build ==="
          cargo tauri build --verbose 2>&1 | tee build.log
          echo "=== Build complete ==="

      # ✅ Show logs if build fails (debugging aid)
      - name: Show logs if failed
        if: failure()
        run: tail -n 300 build.log || echo "No build.log found"

      # ✅ Upload artifacts (Linux)
      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      # ✅ Upload artifacts (Windows)
      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      # ✅ Upload artifacts (macOS)
      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
        # Note: dmg path may vary; adjust if needed:
        # path: src-tauri/target/release/bundle/dmg/*.dmg
