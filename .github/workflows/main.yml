name: Build Raseed

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false  # ✅ prevents macOS from canceling others
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: raseed-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: raseed-windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: raseed-macos

    runs-on: ${{ matrix.os }}

    env:
      TAURI_SKIP_SIGNING: true  # ✅ VERY IMPORTANT
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ✅ FIX macOS crashes
      - name: Setup Xcode (macOS)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Add macOS target (safety)
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            patchelf

      - name: Install JS dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        env:
          RUST_BACKTRACE: 1
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npx @tauri-apps/cli build --verbose

      # ✅ Uploads (unchanged)
      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
