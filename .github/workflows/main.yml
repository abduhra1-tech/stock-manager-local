name: Build Raseed

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@8f24350df7befe3e7700cbf5c252e9d95310beb3  # v2.0.0 (valid SHA)
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7a0b998aa7fcae62b9a38cbc735dd86b17db  # stable (valid SHA)
        with:
          toolchain: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            patchelf \
            libappindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        run: npx @tauri-apps/cli build --bundles deb,rpm,appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: raseed-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@8f24350df7befe3e7700cbf5c252e9d95310beb3  # v2.0.0 (valid SHA)
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a54c7a0b998aa7fcae62b9a38cbc735dd86b17db  # stable (valid SHA)
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        run: npx @tauri-apps/cli build --bundles msi,nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: raseed-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
