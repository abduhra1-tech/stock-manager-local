name: Raseed Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: ./stockbase

    steps:
      - name: Checkout repository
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac

      - name: Setup Node
        uses: actions/setup-node@8f4b7f848c1a5f4e7d6c7bfb6c53a64a1c9e0c2b
        with:
          node-version: 20

      - name: Install Bun
        run: npm install -g bun

      - name: Install Rust
        uses: dtolnay/rust-toolchain@a1c6e3c6b1d9a1c6b1e6d4c5f1a2b3c4d5e6f7a8
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a8b4e4e6c2d1c2c4c6a7e8f9
        with:
          name: stock-manager-${{ matrix.platform }}
          path: stockbase/src-tauri/target/release/bundle/**/*
          retention-days: 7
