# .github/workflows/build.yml
name: Build Raseed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install frontend dependencies
        run: bun install
      
      - name: Build frontend
        run: bun run build
      
      - name: Build Tauri (Linux)
        run: npx @tauri-apps/cli build --bundles deb,rpm,appimage
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-linux
          path: src-tauri/target/release/bundle/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install frontend dependencies
        run: bun install
      
      - name: Build frontend
        run: bun run build
      
      - name: Build Tauri (Windows)
        run: npx @tauri-apps/cli build --bundles msi,nsis
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-windows
          path: src-tauri/target/release/bundle/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install frontend dependencies
        run: bun install
      
      - name: Build frontend
        run: bun run build
      
      - name: Build Tauri (macOS)
        run: npx @tauri-apps/cli build --bundles dmg
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raseed-macos
          path: src-tauri/target/release/bundle/
