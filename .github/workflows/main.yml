# .github/workflows/main.yml
name: Build Raseed

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  RUST_BACKTRACE: full
  RUST_LOG: trace
  CARGO_TERM_VERBOSE: true
  APP_NAME: Raseed
  APP_VERSION: 0.1.0

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b6c782352e4b8a618342ac15bcbb85fcb2  # v2.0.0
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@37ccb0e5bc2473f4ea4d6e2b7b11b97d1a8e3f2e  # stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            build-essential \
            patchelf

      # ✅ STEP 1: Install frontend deps
      - name: Install dependencies
        run: bun install

      # ✅ STEP 2: BUILD FRONTEND FIRST (creates dist/)
      - name: Build frontend
        run: |
          echo "=== Building frontend ==="
          bun run build
          echo "=== Frontend build complete ==="
          ls -la dist/ 2>/dev/null || echo "⚠️ dist/ not found"

      # ✅ STEP 3: Verify dist exists (AFTER build)
      - name: Verify dist exists
        run: |
          if [ -d "dist" ]; then
            echo "✅ dist/ folder found"
            ls -la dist/
          else
            echo "❌ dist/ missing — frontend build failed"
            exit 1
          fi

      # ✅ STEP 4: Build Tauri app (with debug logging)
      - name: Build Tauri app
        run: |
          echo "=== START TAURI BUILD ==="
          npx @tauri-apps/cli build 2>&1 | tee build.log
          echo "=== BUILD COMPLETE ==="

      # ✅ STEP 5: Upload artifacts
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: raseed-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      # ✅ Fallback: Show logs if build fails
      - name: Show logs if failed
        if: failure()
        run: |
          echo "=== BUILD LOG (last 300 lines) ==="
          tail -n 300 build.log 2>/dev/null || echo "No build.log found"
          echo "=== END LOG ==="

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b6c782352e4b8a618342ac15bcbb85fcb2  # v2.0.0
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@37ccb0e5bc2473f4ea4d6e2b7b11b97d1a8e3f2e  # stable
        with:
          targets: x86_64-pc-windows-msvc

      # ✅ STEP 1: Install frontend deps
      - name: Install dependencies
        run: bun install

      # ✅ STEP 2: BUILD FRONTEND FIRST (creates dist/)
      - name: Build frontend
        run: |
          echo "=== Building frontend ==="
          bun run build
          echo "=== Frontend build complete ==="
          Get-ChildItem dist/ -ErrorAction SilentlyContinue || Write-Warning "dist/ not found"

      # ✅ STEP 3: Verify dist exists (AFTER build)
      - name: Verify dist exists
        run: |
          if (Test-Path "dist") {
            Write-Host "✅ dist/ folder found"
            Get-ChildItem dist/
          } else {
            Write-Error "❌ dist/ missing — frontend build failed"
            exit 1
          }

      # ✅ STEP 4: Build Tauri app (with debug logging)
      - name: Build Tauri app
        run: |
          echo "=== START TAURI BUILD ==="
          npx @tauri-apps/cli build 2>&1 | Tee-Object -FilePath build.log
          echo "=== BUILD COMPLETE ==="

      # ✅ STEP 5: Upload artifacts
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: raseed-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      # ✅ Fallback: Show logs if build fails
      - name: Show logs if failed
        if: failure()
        run: |
          Write-Host "=== BUILD LOG (last 300 lines) ==="
          Get-Content build.log -Tail 300 -ErrorAction SilentlyContinue || Write-Warning "No build.log found"
          Write-Host "=== END LOG ==="
