name: Raseed Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: ./stockbase

    steps:
      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Setup Node
        uses: actions/setup-node@64ed1f7e5c5b5d8c7a3a0655e768f8b51006979c
        with:
          node-version: 20

      - name: Install Bun
        run: npm install -g bun

      - name: Install Rust
        uses: dtolnay/rust-toolchain@7b31c1a4a5f63c1e2b7f7a9c4b9cdb7c0d3b0c3a
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@0b7f8abb1508181956e8aaf7d62b0c7f9f6a1f0d
        with:
          name: stock-manager-${{ matrix.platform }}
          path: stockbase/src-tauri/target/release/bundle/**/*
          retention-days: 7
